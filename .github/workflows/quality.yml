name: Web quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: web-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obtain source
        uses: actions/checkout@v7

      - name: Configure Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Run web tests
        run: node --test tests/*.test.cjs
